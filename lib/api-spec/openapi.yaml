openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scraper
    description: Image scraping operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /scraper/start:
    post:
      operationId: startScrape
      tags: [scraper]
      summary: Start a scraping session
      description: Begins crawling the target site and returns a session ID
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartScrapeRequest"
      responses:
        "200":
          description: Scrape session started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeSession"
        "409":
          description: A scrape is already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scraper/verify-login:
    post:
      operationId: verifyLogin
      tags: [scraper]
      summary: Verify that provided cookies grant authenticated access
      description: Makes a test request to the target site and checks whether the response indicates a logged-in session
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyLoginRequest"
      responses:
        "200":
          description: Login verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginVerifyResult"
        "502":
          description: Could not reach the target site
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginVerifyResult"

  /scraper/status:
    get:
      operationId: getScrapeStatus
      tags: [scraper]
      summary: Get current scrape status
      description: Returns current progress, visited pages, and found images
      responses:
        "200":
          description: Current scrape status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeStatus"

  /scraper/images:
    get:
      operationId: getScrapeImages
      tags: [scraper]
      summary: Get all discovered images
      description: Returns the full list of images found so far
      responses:
        "200":
          description: List of discovered images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScrapedImage"

  /scraper/reset:
    post:
      operationId: resetScrape
      tags: [scraper]
      summary: Reset scraper state
      description: Clears all scrape results and resets to idle state
      responses:
        "200":
          description: Reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScrapeSession"

  /scraper/images/{id}/download:
    get:
      operationId: downloadImage
      tags: [scraper]
      summary: Download a single image via server proxy
      description: Fetches the image server-side and returns it as an attachment so cross-origin download works reliably
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image file
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: Image not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "502":
          description: Failed to fetch image from origin
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /scraper/download-zip:
    get:
      operationId: downloadImagesZip
      tags: [scraper]
      summary: Download images as a zip archive
      description: Streams a zip file containing all discovered images, or a subset when `ids` is provided
      parameters:
        - name: ids
          in: query
          required: false
          description: Comma-separated list of image IDs to include. Omit to download all.
          schema:
            type: string
      responses:
        "200":
          description: Zip archive of all discovered images
          content:
            application/zip:
              schema:
                type: string
                format: binary
        "400":
          description: No images to download
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    StartScrapeRequest:
      type: object
      properties:
        maxPages:
          type: integer
          minimum: 0
          description: Maximum pages to crawl. 0 means unlimited.
          default: 500
        minDimension:
          type: integer
          minimum: 0
          description: Minimum width AND height (px) an image must have to be collected. 0 means no limit. Only applies when dimensions are known from HTML attributes.
          default: 0
        cookies:
          type: string
          description: Raw Cookie header value to send with every request (e.g. "session_id=abc; other=xyz"). Lets the scraper access pages that require a login.

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ScrapeSession:
      type: object
      properties:
        sessionId:
          type: string
        status:
          type: string
          enum: [idle, running, done, error]
        message:
          type: string
      required:
        - sessionId
        - status

    ScrapeStatus:
      type: object
      properties:
        sessionId:
          type: string
        status:
          type: string
          enum: [idle, running, done, error]
        pagesVisited:
          type: integer
        pagesQueued:
          type: integer
        imagesFound:
          type: integer
        currentUrl:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
      required:
        - sessionId
        - status
        - pagesVisited
        - pagesQueued
        - imagesFound
        - currentUrl
        - errorMessage

    ScrapedImage:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
        sourcePageUrl:
          type: string
        alt:
          type: ["string", "null"]
        width:
          type: ["integer", "null"]
        height:
          type: ["integer", "null"]
      required:
        - id
        - url
        - sourcePageUrl
        - alt
        - width
        - height

    VerifyLoginRequest:
      type: object
      properties:
        cookies:
          type: string
          description: Raw Cookie header value to test

    LoginVerifyResult:
      type: object
      properties:
        loggedIn:
          type: boolean
        username:
          type: ["string", "null"]
        message:
          type: string
      required:
        - loggedIn
        - username
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
